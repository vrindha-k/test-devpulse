<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkPulse Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060c06;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 50px;
    font-family: 'Courier New', monospace;
  }

  h3 {
    color: #39ff1466;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: -30px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 36px 52px 36px 44px;
    background: #0a0f0a;
    border-radius: 16px;
    border: 1px solid #39ff1422;
    box-shadow: 0 0 40px #39ff1415, inset 0 0 60px #00000040;
    position: relative;
    overflow: visible;
    width: auto;
  }

  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(ellipse at 20% 50%, #39ff1408 0%, transparent 60%);
    pointer-events: none;
  }

  .pulse-path {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawPulse 1.2s ease forwards;
  }
  @keyframes drawPulse { to { stroke-dashoffset: 0; } }

  .pulse-dot {
    opacity: 0;
    animation: dotAppear 0.3s ease 1.1s forwards;
  }
  @keyframes dotAppear { to { opacity: 1; } }

  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 8px;
    white-space: nowrap;
  }

  .brand-name {
    font-family: 'Orbitron', 'Courier New', monospace;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 4px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.9s forwards;
    display: flex;
  }

  .work  { color: #39ff14; text-shadow: 0 0 18px #39ff1480, 0 0 36px #39ff1440; }
  .pulse-text { color: #ffffff; text-shadow: 0 0 14px #ffffff50; }

  .tagline {
    font-size: 11px;
    letter-spacing: 5px;
    color: #39ff1455;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .variants {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .variant {
    padding: 18px 24px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
  }

  .v-dark  { background: #0a0f0a; border: 1px solid #39ff1422; }
  .v-light { background: #f0faf0; border: 1px solid #00aa4422; }
  .v-mid   { background: #111d11; border: 1px solid #39ff1433; }

  .v-icon { width: 40px; height: 28px; flex-shrink: 0; }

  .v-label {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 2px;
  }

  .dark-label  .work { color: #39ff14; text-shadow: 0 0 10px #39ff1460; }
  .dark-label  .pulse-text { color: white; }
  .light-label .work { color: #00aa44; }
  .light-label .pulse-text { color: #0a1a0a; }
  .mid-label   .work { color: #55ff44; text-shadow: 0 0 10px #55ff4450; }
  .mid-label   .pulse-text { color: #cceedd; }
</style>
</head>
<body>

  <h3>Primary Logo</h3>

  <div class="logo-wrap">
    <svg width="110" height="66" viewBox="0 0 110 66" fill="none" style="flex-shrink:0">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00ff88"/>
          <stop offset="100%" stop-color="#39ff14"/>
        </linearGradient>
      </defs>
      <polyline class="pulse-path"
        points="4,33 22,33 31,9 42,57 52,20 62,33 82,33"
        stroke="url(#grad)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
      <circle class="pulse-dot" cx="82" cy="33" r="5"
        fill="#39ff14" filter="url(#glow)"/>
    </svg>

    <div class="wordmark">
      <div class="brand-name">
        <span class="work">WORK</span><span class="pulse-text">PULSE</span>
      </div>
      <div class="tagline">Remote Workforce Monitor</div>
    </div>
  </div>

  <h3>Color Variants</h3>

  <div class="variants">
    <div class="variant v-dark">
      <svg class="v-icon" viewBox="0 0 84 50" fill="none">
        <defs>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ff88"/>
            <stop offset="100%" stop-color="#39ff14"/>
          </linearGradient>
        </defs>
        <polyline points="2,25 16,25 23,8 31,42 38,16 46,25 62,25"
          stroke="url(#g2)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="62" cy="25" r="3.5" fill="#39ff14"/>
      </svg>
      <div class="v-label dark-label">
        <span class="work">WORK</span><span class="pulse-text">PULSE</span>
      </div>
    </div>

    <div class="variant v-light">
      <svg class="v-icon" viewBox="0 0 84 50" fill="none">
        <polyline points="2,25 16,25 23,8 31,42 38,16 46,25 62,25"
          stroke="#00aa44" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="62" cy="25" r="3.5" fill="#00aa44"/>
      </svg>
      <div class="v-label light-label">
        <span class="work">WORK</span><span class="pulse-text">PULSE</span>
      </div>
    </div>

    <div class="variant v-mid">
      <svg class="v-icon" viewBox="0 0 84 50" fill="none">
        <defs>
          <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#44ffaa"/>
            <stop offset="100%" stop-color="#55ff44"/>
          </linearGradient>
        </defs>
        <polyline points="2,25 16,25 23,8 31,42 38,16 46,25 62,25"
          stroke="url(#g3)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="62" cy="25" r="3.5" fill="#55ff44"/>
      </svg>
      <div class="v-label mid-label">
        <span class="work">WORK</span><span class="pulse-text">PULSE</span>
      </div>
    </div>
  </div>

</body>
</html>
